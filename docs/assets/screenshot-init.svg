<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="13">
  <defs>
    <linearGradient id="titleBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2b2622"/>
      <stop offset="1" stop-color="#1f1b18"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="800" height="560" rx="10" fill="#1A1915" filter="url(#shadow)"/>
  <path d="M10,20 Q10,10 20,10 L800,10 Q810,10 810,20 L810,40 L10,40 Z" fill="url(#titleBar)"/>
  <line x1="10" y1="40" x2="810" y2="40" stroke="#000" stroke-opacity="0.4"/>
  <circle cx="28" cy="25" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="25" r="6" fill="#febc2e"/>
  <circle cx="68" cy="25" r="6" fill="#28c841"/>
  <text x="410" y="29" fill="#8a7f73" text-anchor="middle" font-size="12">my-api — zsh</text>

  <!-- Prompt -->
  <text x="24" y="72" fill="#E8DDD3" xml:space="preserve"><tspan fill="#D97757">❯</tspan> npx <tspan fill="#EBB299">@startfast-ai/ctxcore</tspan> init</text>

  <!-- Frame: drawn as a real rectangle outline, not ASCII text -->
  <rect x="40" y="100" width="480" height="48" rx="2" fill="none" stroke="#D97757" stroke-width="1.5"/>
  <text x="60" y="130" fill="#E8DDD3" font-weight="bold" font-size="14">Initializing</text>

  <!-- Progress output — indexed by line number for clean alignment -->
  <text x="24" y="184" fill="#8BA67E" xml:space="preserve">✓</text>
  <text x="44" y="184" fill="#E8DDD3">Claude CLI found:</text>
  <text x="190" y="184" fill="#D1C4B5">/opt/homebrew/bin/claude</text>

  <text x="44" y="204" fill="#BFA390" xml:space="preserve">Embedding model:</text>
  <text x="190" y="204" fill="#E8DDD3">jina-code (768d)</text>

  <text x="24" y="224" fill="#8BA67E">✓</text>
  <text x="44" y="224" fill="#E8DDD3">Local embeddings ready (jina-code, 768d)</text>

  <text x="44" y="244" fill="#E8DDD3">Database created:</text>
  <text x="190" y="244" fill="#D1C4B5">/Users/dev/my-api/.memory.db</text>

  <text x="44" y="264" fill="#E8DDD3">Project config saved:</text>
  <text x="190" y="264" fill="#D1C4B5">.ctxcore.json</text>

  <text x="24" y="284" fill="#8BA67E">✓</text>
  <text x="44" y="284" fill="#E8DDD3">Detected:</text>
  <text x="190" y="284" fill="#EBB299">TypeScript + Express</text>

  <text x="44" y="316" fill="#BFA390">Seeded</text>
  <text x="98" y="316" fill="#E8DDD3" font-weight="bold">38</text>
  <text x="120" y="316" fill="#BFA390">memories:</text>

  <!-- Memory breakdown — each row as separate text for alignment safety -->
  <g font-size="13">
    <text x="68" y="338" fill="#D97757">3</text>
    <text x="90" y="338" fill="#E8DDD3">architectural decisions</text>

    <text x="68" y="358" fill="#D97757">8</text>
    <text x="90" y="358" fill="#E8DDD3">conventions</text>

    <text x="68" y="378" fill="#D97757">14</text>
    <text x="90" y="378" fill="#E8DDD3">dependencies</text>

    <text x="68" y="398" fill="#D97757">9</text>
    <text x="90" y="398" fill="#E8DDD3">patterns from git history</text>

    <text x="68" y="418" fill="#D97757">4</text>
    <text x="90" y="418" fill="#E8DDD3">potential issues</text>
  </g>

  <text x="24" y="450" fill="#8BA67E">✓</text>
  <text x="44" y="450" fill="#E8DDD3">Embedded 38 memories</text>

  <text x="24" y="470" fill="#8BA67E">✓</text>
  <text x="44" y="470" fill="#E8DDD3">MCP server registered in .mcp.json</text>

  <text x="24" y="490" fill="#8BA67E">✓</text>
  <text x="44" y="490" fill="#E8DDD3">Nightly reflexion scheduled</text>
  <text x="260" y="490" fill="#D1C4B5">(launchd, survives sleep)</text>

  <!-- Divider -->
  <line x1="24" y1="510" x2="500" y2="510" stroke="#2f2a25"/>

  <!-- Summary -->
  <text x="24" y="534" fill="#BFA390">Intelligence</text>
  <text x="168" y="534" fill="#D97757" font-weight="bold">47/100</text>

  <text x="24" y="554" fill="#BFA390">Next:</text>
  <text x="168" y="554" fill="#E8DDD3">restart Claude Code, run</text>
  <text x="360" y="554" fill="#D97757">ctxcore status</text>
</svg>
