<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="13">
  <defs>
    <linearGradient id="titleBar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2b2622"/>
      <stop offset="1" stop-color="#1f1b18"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="800" height="500" rx="10" fill="#1A1915" filter="url(#shadow)"/>
  <path d="M10,20 Q10,10 20,10 L800,10 Q810,10 810,20 L810,40 L10,40 Z" fill="url(#titleBar)"/>
  <line x1="10" y1="40" x2="810" y2="40" stroke="#000" stroke-opacity="0.4"/>
  <circle cx="28" cy="25" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="25" r="6" fill="#febc2e"/>
  <circle cx="68" cy="25" r="6" fill="#28c841"/>
  <text x="410" y="29" fill="#8a7f73" text-anchor="middle" font-size="12">my-api — zsh</text>

  <!-- Prompt -->
  <text x="24" y="72" fill="#E8DDD3" xml:space="preserve"><tspan fill="#D97757">❯</tspan> ctxcore status</text>

  <!-- Frame -->
  <rect x="40" y="100" width="480" height="48" rx="2" fill="none" stroke="#D97757" stroke-width="1.5"/>
  <text x="60" y="130" fill="#E8DDD3" font-weight="bold" font-size="14">my-api</text>

  <!-- Score line -->
  <text x="24" y="180" fill="#E8DDD3">Intelligence Score:</text>
  <text x="196" y="180" fill="#D97757" font-weight="bold" font-size="15">73/100</text>
  <text x="260" y="180" fill="#8BA67E">(+)</text>

  <!-- Dimension bars: rendered as real SVG rects for pixel-perfect alignment -->
  <g font-size="13">
    <!-- Depth -->
    <text x="44" y="216" fill="#BFA390">Depth</text>
    <g>
      <!-- 10 cells, 8 filled -->
      <rect x="180" y="204" width="112" height="14" fill="#D97757"/>
      <rect x="294" y="204" width="28" height="14" fill="#D1C4B5" fill-opacity="0.15"/>
      <!-- Cell divisions -->
      <g stroke="#1A1915" stroke-width="1">
        <line x1="194" y1="204" x2="194" y2="218"/>
        <line x1="208" y1="204" x2="208" y2="218"/>
        <line x1="222" y1="204" x2="222" y2="218"/>
        <line x1="236" y1="204" x2="236" y2="218"/>
        <line x1="250" y1="204" x2="250" y2="218"/>
        <line x1="264" y1="204" x2="264" y2="218"/>
        <line x1="278" y1="204" x2="278" y2="218"/>
        <line x1="294" y1="204" x2="294" y2="218"/>
        <line x1="308" y1="204" x2="308" y2="218"/>
      </g>
    </g>
    <text x="340" y="216" fill="#E8DDD3">82%</text>
    <text x="390" y="216" fill="#D1C4B5">147 active memories</text>

    <!-- Freshness: 6.8 filled → 7 full cells -->
    <text x="44" y="240" fill="#BFA390">Freshness</text>
    <rect x="180" y="228" width="98" height="14" fill="#D97757"/>
    <rect x="278" y="228" width="42" height="14" fill="#D1C4B5" fill-opacity="0.15"/>
    <g stroke="#1A1915" stroke-width="1">
      <line x1="194" y1="228" x2="194" y2="242"/>
      <line x1="208" y1="228" x2="208" y2="242"/>
      <line x1="222" y1="228" x2="222" y2="242"/>
      <line x1="236" y1="228" x2="236" y2="242"/>
      <line x1="250" y1="228" x2="250" y2="242"/>
      <line x1="264" y1="228" x2="264" y2="242"/>
      <line x1="280" y1="228" x2="280" y2="242"/>
      <line x1="294" y1="228" x2="294" y2="242"/>
      <line x1="308" y1="228" x2="308" y2="242"/>
    </g>
    <text x="340" y="240" fill="#E8DDD3">68%</text>
    <text x="390" y="240" fill="#D1C4B5">last reflexion 8h ago</text>

    <!-- Coherence: 7 filled -->
    <text x="44" y="264" fill="#BFA390">Coherence</text>
    <rect x="180" y="252" width="98" height="14" fill="#D97757"/>
    <rect x="278" y="252" width="42" height="14" fill="#D1C4B5" fill-opacity="0.15"/>
    <g stroke="#1A1915" stroke-width="1">
      <line x1="194" y1="252" x2="194" y2="266"/>
      <line x1="208" y1="252" x2="208" y2="266"/>
      <line x1="222" y1="252" x2="222" y2="266"/>
      <line x1="236" y1="252" x2="236" y2="266"/>
      <line x1="250" y1="252" x2="250" y2="266"/>
      <line x1="264" y1="252" x2="264" y2="266"/>
      <line x1="280" y1="252" x2="280" y2="266"/>
      <line x1="294" y1="252" x2="294" y2="266"/>
      <line x1="308" y1="252" x2="308" y2="266"/>
    </g>
    <text x="340" y="264" fill="#E8DDD3">71%</text>
    <text x="390" y="264" fill="#D1C4B5">connected memory ratio</text>

    <!-- Coverage: 6 filled -->
    <text x="44" y="288" fill="#BFA390">Coverage</text>
    <rect x="180" y="276" width="84" height="14" fill="#D97757"/>
    <rect x="264" y="276" width="56" height="14" fill="#D1C4B5" fill-opacity="0.15"/>
    <g stroke="#1A1915" stroke-width="1">
      <line x1="194" y1="276" x2="194" y2="290"/>
      <line x1="208" y1="276" x2="208" y2="290"/>
      <line x1="222" y1="276" x2="222" y2="290"/>
      <line x1="236" y1="276" x2="236" y2="290"/>
      <line x1="250" y1="276" x2="250" y2="290"/>
      <line x1="266" y1="276" x2="266" y2="290"/>
      <line x1="280" y1="276" x2="280" y2="290"/>
      <line x1="294" y1="276" x2="294" y2="290"/>
      <line x1="308" y1="276" x2="308" y2="290"/>
    </g>
    <text x="340" y="288" fill="#E8DDD3">64%</text>
    <text x="390" y="288" fill="#D1C4B5">memory count + tag diversity</text>
  </g>

  <!-- Key/value block -->
  <text x="24" y="324" fill="#BFA390">Model</text>
  <text x="160" y="324" fill="#E8DDD3">jina-code (768d)</text>

  <text x="24" y="344" fill="#BFA390">Provider</text>
  <text x="160" y="344" fill="#E8DDD3">transformers</text>

  <text x="24" y="364" fill="#BFA390">Memories</text>
  <text x="160" y="364" fill="#E8DDD3" font-weight="bold">147</text>
  <text x="188" y="364" fill="#E8DDD3">active, 12 archived</text>

  <!-- Tier distribution with real badges -->
  <g>
    <!-- Long-term -->
    <rect x="24" y="384" width="28" height="16" fill="#B0593E" rx="2"/>
    <text x="38" y="396" fill="#ffffff" font-weight="bold" text-anchor="middle" font-size="11">LT</text>
    <rect x="62" y="386" width="260" height="12" fill="#B0593E"/>
    <rect x="322" y="386" width="40" height="12" fill="#D1C4B5" fill-opacity="0.15"/>
    <text x="376" y="396" fill="#E8DDD3">76</text>

    <!-- Operational -->
    <rect x="24" y="408" width="28" height="16" fill="#D97757" rx="2"/>
    <text x="38" y="420" fill="#ffffff" font-weight="bold" text-anchor="middle" font-size="11">OP</text>
    <rect x="62" y="410" width="160" height="12" fill="#D97757"/>
    <rect x="222" y="410" width="140" height="12" fill="#D1C4B5" fill-opacity="0.15"/>
    <text x="376" y="420" fill="#E8DDD3">48</text>

    <!-- Short-term -->
    <rect x="24" y="432" width="28" height="16" fill="#BFA390" rx="2"/>
    <text x="38" y="444" fill="#1A1915" font-weight="bold" text-anchor="middle" font-size="11">ST</text>
    <rect x="62" y="434" width="78" height="12" fill="#BFA390"/>
    <rect x="140" y="434" width="222" height="12" fill="#D1C4B5" fill-opacity="0.15"/>
    <text x="376" y="444" fill="#E8DDD3">23</text>
  </g>

  <!-- Recent memories preview -->
  <text x="24" y="476" fill="#D1C4B5">Recent memories:</text>

  <rect x="24" y="484" width="28" height="16" fill="#B0593E" rx="2"/>
  <text x="38" y="496" fill="#ffffff" font-weight="bold" text-anchor="middle" font-size="11">LT</text>
  <text x="62" y="496" fill="#E8DDD3">Chose event sourcing for audit trail (ADR-003)</text>
</svg>
